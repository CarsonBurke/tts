name: Release binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to upload assets to.
        required: false
        default: v0.1.1
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: tts-macos-arm64
          - os: ubuntu-24.04
            artifact: tts-linux-x64
          - os: windows-2025
            artifact: tts-windows-x64.exe

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build binary
        shell: bash
        run: |
          python -m pip install -U pip "setuptools<82" wheel
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.6"
          fi
          python -m pip install -e ".[kokoro]"
          python -m pip install "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl"
          python -m pip install pyinstaller
          pyinstaller \
            --clean \
            --onefile \
            --name tts \
            --collect-all kokoro \
            --collect-all misaki \
            --collect-data language_tags \
            --collect-data csvw \
            --collect-data segments \
            --collect-data espeakng_loader \
            --collect-all en_core_web_sm \
            --collect-data spacy \
            --collect-data thinc \
            --collect-submodules spacy.lang.en \
            --hidden-import tts.backends.kokoro \
            --hidden-import tts.backends.system \
            scripts/tts_launcher.py

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/tts.exe "release/${{ matrix.artifact }}"
          else
            cp dist/tts "release/${{ matrix.artifact }}"
            chmod +x "release/${{ matrix.artifact }}"
          fi
          if command -v shasum >/dev/null 2>&1; then
            (cd release && shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256")
          else
            (cd release && sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256")
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/${{ matrix.artifact }}
            release/${{ matrix.artifact }}.sha256

      - name: Upload to release
        if: github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: |
            release/${{ matrix.artifact }}
            release/${{ matrix.artifact }}.sha256
