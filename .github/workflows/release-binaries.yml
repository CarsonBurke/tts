name: Release binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag used by the uv-managed daemon package.
        required: false
        default: v0.1.6
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            artifact: tts-macos-arm64
          - goos: linux
            goarch: amd64
            artifact: tts-linux-x64
          - goos: windows
            goarch: amd64
            artifact: tts-windows-x64.exe

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build native client
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        run: |
          mkdir -p release
          go build \
            -ldflags "-X 'main.daemonPackage=tts[kokoro] @ git+https://github.com/CarsonBurke/tts@${RELEASE_TAG}' -X 'main.daemonPython=3.12'" \
            -o "release/${{ matrix.artifact }}" \
            ./cmd/tts-client
          if [[ "${{ matrix.goos }}" != "windows" ]]; then
            chmod +x "release/${{ matrix.artifact }}"
          fi
          sha256sum "release/${{ matrix.artifact }}" > "release/${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/${{ matrix.artifact }}
            release/${{ matrix.artifact }}.sha256

      - name: Upload to release
        if: github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          files: |
            release/${{ matrix.artifact }}
            release/${{ matrix.artifact }}.sha256
